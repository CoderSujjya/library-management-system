<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Book</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff7b00,#ff9800,#ffb74d);
}

/* Navigation */

.nav-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:25px;
    flex-wrap:wrap;
}

.nav-bar a{
    text-decoration:none;
    color:#ff6f00;
    background:white;
    padding:12px 25px;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.nav-bar a:hover{
    background:#ff6f00;
    color:white;
    transform:translateY(-3px);
}

/* Form */

.form-panel{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.card{
    width:450px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    animation:fadeIn .7s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    text-align:center;
    color:#ff6f00;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#444;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:2px solid #ffd180;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#ff6f00;
    box-shadow:0 0 8px rgba(255,111,0,.4);
}

textarea{
    resize:vertical;
    min-height:100px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ff6f00;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#e65100;
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

@media(max-width:600px){

.card{
    width:95%;
}

.nav-bar{
    flex-direction:column;
    align-items:center;
}

.nav-bar a{
    width:220px;
    text-align:center;
}

}
</style>

</head>

<body>

<div class="nav-bar">
    <a th:href="@{/welcome}">🏠 Catalog</a>
    <a th:href="@{/books/list}">📚 Book List</a>
    <a th:href="@{/logout}">🚪 Logout</a>
</div>

<div class="form-panel">

    <div class="card">

        <h2>📖 Update Book</h2>

        <form th:action="@{/books/update}" th:object="${book}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Book ID</label>
                <input type="text" th:value="${book.id}" disabled>
            </div>

            <div class="form-group">
                <label>Book Title</label>
                <input type="text" th:field="*{title}" required>
            </div>

            <div class="form-group">
                <label>Author</label>
                <input type="text" th:field="*{author}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" placeholder="Enter book description..."></textarea>
            </div>

            <button type="submit" class="btn">
                ✅ Update Book
            </button>

        </form>

    </div>

</div>

</body>
</html>
