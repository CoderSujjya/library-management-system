<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Book List</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#1e3c72,#2a5298,#4facfe);
}

/* Navigation */

.nav-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:25px;
    flex-wrap:wrap;
}

.nav-bar a{
    text-decoration:none;
    background:#fff;
    color:#1e3c72;
    padding:12px 28px;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.nav-bar a:hover{
    background:#ff9800;
    color:#fff;
    transform:translateY(-3px);
}

/* Card */

.form-panel{
    max-width:900px;
    margin:20px auto;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    text-align:center;
    color:#1e3c72;
    margin-bottom:30px;
    font-size:32px;
}

/* Empty */

.empty-state{
    text-align:center;
    padding:30px;
    color:#777;
    font-size:18px;
}

/* Book Item */

.book-item{
    border-left:6px solid #ff9800;
    background:#f8f9ff;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.book-item:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,.18);
}

.title{
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
    color:#1e3c72;
}

.title:hover{
    color:#ff9800;
}

.meta{
    margin-top:10px;
    color:#555;
    font-size:17px;
}

.row-actions{
    margin-top:18px;
}

.row-actions a{
    display:inline-block;
    text-decoration:none;
    color:#fff;
    background:#1e3c72;
    padding:10px 18px;
    margin-right:10px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.row-actions a:hover{
    background:#ff9800;
}

/* Mobile */

@media(max-width:600px){

.nav-bar{
    flex-direction:column;
    align-items:center;
}

.nav-bar a{
    width:220px;
    text-align:center;
}

.card{
    padding:20px;
}

.title{
    font-size:20px;
}

.row-actions a{
    display:block;
    margin:10px 0;
    text-align:center;
}

}
</style>

</head>

<body>

<div class="nav-bar">
    <a th:href="@{/welcome}">🏠 Home</a>
    <a th:href="@{/books/add}">➕ Add Book</a>
    <a th:href="@{/logout}">🚪 Logout</a>
</div>

<div class="form-panel">

    <div class="card">

        <h2>📚 Library Book List</h2>

        <div th:if="${#lists.isEmpty(books)}" class="empty-state">
            📖 No books available in the library.<br>
            Click <strong>Add Book</strong> to create your first record.
        </div>

        <div th:each="b : ${books}" class="book-item">

            <a class="title"
               th:href="@{'/books/' + ${b.id}}"
               th:text="${b.title}">
               Book Title
            </a>

            <div class="meta">
                ✍️ <strong>Author:</strong>
                <span th:text="${b.author}"></span>
            </div>

            <div class="row-actions">
                <a th:href="@{'/books/edit/' + ${b.id}}">
                    ✏ Edit
                </a>

                <a th:href="@{'/books/delete/' + ${b.id}}"
                   onclick="return confirm('Are you sure you want to delete this book?');">
                    🗑 Delete
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
