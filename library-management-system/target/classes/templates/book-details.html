<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Book Details</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#1e3c72,#2a5298,#4facfe);
}

/* Navigation */

.nav-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:25px;
    flex-wrap:wrap;
}

.nav-bar a{
    text-decoration:none;
    color:#1e3c72;
    background:#fff;
    padding:12px 28px;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.nav-bar a:hover{
    background:#ff9800;
    color:#fff;
    transform:translateY(-3px);
}

/* Main Card */

.detail-panel{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.card{
    width:550px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card-header{
    background:linear-gradient(90deg,#ff9800,#ff6f00);
    color:#fff;
    text-align:center;
    padding:22px;
    font-size:28px;
    font-weight:bold;
}

.detail-row{
    padding:18px 25px;
    border-bottom:1px solid #eee;
    font-size:17px;
    color:#444;
}

.detail-row strong{
    color:#1e3c72;
}

.description{
    line-height:1.7;
}

.back-link{
    text-align:center;
    padding:25px;
}

.back-link a{
    text-decoration:none;
    background:#1e3c72;
    color:#fff;
    padding:12px 28px;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
}

.back-link a:hover{
    background:#ff9800;
}

@media(max-width:600px){

.card{
    width:95%;
}

.nav-bar{
    flex-direction:column;
    align-items:center;
}

.nav-bar a{
    width:220px;
    text-align:center;
}

}
</style>

</head>

<body>

<div class="nav-bar">
    <a th:href="@{/welcome}">🏠 Home</a>
    <a th:href="@{/books/list}">📚 Book List</a>
    <a th:href="@{/logout}">🚪 Logout</a>
</div>

<div class="detail-panel">

    <div class="card">

        <div class="card-header">
            📖 Book Details
        </div>

        <div class="detail-row">
            <strong>📕 Title:</strong>
            <span th:text="${book.title}">Title</span>
        </div>

        <div class="detail-row">
            <strong>✍️ Author:</strong>
            <span th:text="${book.author}">Author</span>
        </div>

        <div class="detail-row description">
            <strong>📝 Description:</strong><br><br>
            <span th:text="${book.description}">Description</span>
        </div>

        <div class="back-link">
            <a th:href="@{/books/list}">⬅ Back to Book List</a>
        </div>

    </div>

</div>

</body>
</html>
