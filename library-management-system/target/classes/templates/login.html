<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1E3C72,#2A5298);
        }

        .card{
            width:400px;
            background:#fff;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,.3);
            text-align:center;
            animation:fadeIn .8s ease;
        }

        .logo{
            font-size:60px;
            margin-bottom:10px;
        }

        h1{
            color:#1E3C72;
            margin-bottom:5px;
        }

        p{
            color:#777;
            margin-bottom:25px;
        }

        .form-group{
            text-align:left;
            margin-bottom:18px;
        }

        .form-group label{
            display:block;
            margin-bottom:6px;
            font-weight:500;
            color:#444;
        }

        .form-group input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
            transition:.3s;
        }

        .form-group input:focus{
            outline:none;
            border-color:#2A5298;
            box-shadow:0 0 8px rgba(42,82,152,.4);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2A5298;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#1E3C72;
            transform:translateY(-2px);
        }

        .link-row{
            margin-top:20px;
        }

        .link-row a{
            text-decoration:none;
            color:#2A5298;
            font-weight:600;
        }

        .link-row a:hover{
            text-decoration:underline;
        }

        .error-msg{
            background:#ff4d4d;
            color:white;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:450px){

            .card{
                width:90%;
                padding:30px;
            }

        }

    </style>

</head>
<body>

<div class="card">

    <div class="logo">📚</div>

    <h1>Library Management System</h1>
    <p>Login to Continue</p>

    <div class="error-msg" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label>Username</label>
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit" class="btn">
            Login
        </button>

    </form>

    <div class="link-row">
        New User?
        <a th:href="@{/register}">Register Here</a>
    </div>

</div>

</body>
</html>
